<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARENA BRAWL 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:#000;width:100vw;height:100vh;overflow:hidden;}
#gw{position:relative;width:100%;height:100%;background:#050a05;overflow:hidden;touch-action:none;}
#c{display:block;width:100%;height:100%;}
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;}
#sc{color:#0f0;font-size:clamp(17px,4.5vw,26px);font-weight:bold;font-family:monospace;text-shadow:0 0 8px #0f0;}
#wlbl{color:#0a0;font-size:clamp(8px,2vw,11px);font-family:monospace;margin-top:2px;}
#lbar{display:flex;gap:4px;pointer-events:all;}
.lb{border-radius:4px;padding:3px 8px;font-size:clamp(9px,2.2vw,12px);cursor:pointer;font-family:monospace;border:1px solid;}
#rhud{text-align:right;}
#lhud{font-size:clamp(14px,4vw,22px);}
#hpbw{width:clamp(52px,13vw,88px);height:6px;background:rgba(255,255,255,0.08);border-radius:4px;margin:3px 0 2px auto;}
#hpf{height:100%;border-radius:4px;width:100%;background:linear-gradient(90deg,#0f0,#8f0);transition:width 0.2s;}
#aml{color:#ff0;font-size:clamp(8px,2vw,11px);font-family:monospace;}
#msg{position:absolute;top:clamp(46px,12vw,62px);left:50%;transform:translateX(-50%);color:#0f0;font-size:clamp(12px,3.5vw,16px);font-weight:bold;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;font-family:monospace;z-index:5;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;width:22px;height:22px;z-index:4;}
#crosshair::before{content:"";position:absolute;top:50%;left:0;width:100%;height:1px;background:rgba(0,255,0,0.7);}
#crosshair::after{content:"";position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,255,0,0.7);}
/* Mobile controls */
#jw{position:absolute;left:10px;bottom:10px;width:clamp(100px,26vw,130px);height:clamp(100px,26vw,130px);background:rgba(0,255,0,0.05);border:1.5px solid rgba(0,255,0,0.2);border-radius:50%;display:none;z-index:5;touch-action:none;}
#js{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(34px,9vw,46px);height:clamp(34px,9vw,46px);background:rgba(0,255,0,0.2);border:1.5px solid rgba(0,255,0,0.4);border-radius:50%;}
#fire-btn{position:absolute;right:10px;bottom:10px;width:clamp(62px,16vw,80px);height:clamp(62px,16vw,80px);background:rgba(255,50,50,0.2);border:2px solid #f44;border-radius:50%;color:#f88;font-size:clamp(22px,5.5vw,30px);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;touch-action:none;}
#reload-btn{position:absolute;right:clamp(76px,20vw,102px);bottom:10px;width:clamp(48px,12vw,62px);height:clamp(48px,12vw,62px);background:rgba(255,220,0,0.15);border:2px solid #ff0;border-radius:50%;color:#ff0;font-size:clamp(14px,3.5vw,18px);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;touch-action:none;}
/* Overlay */
#ov{position:absolute;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;z-index:20;padding:20px;}
#otitle{color:#0f0;font-size:clamp(22px,7vw,40px);font-weight:bold;letter-spacing:4px;text-shadow:0 0 20px #0f0;font-family:monospace;}
#odesc{color:#0a0;font-size:clamp(11px,2.8vw,14px);text-align:center;max-width:310px;line-height:1.9;font-family:monospace;}
#osc{color:#ff0;font-size:clamp(13px,3.5vw,18px);font-family:monospace;display:none;margin-top:4px;}
#pbtn{background:rgba(0,255,0,0.1);border:1.5px solid #0f0;color:#0f0;border-radius:10px;padding:clamp(9px,2.5vw,13px) clamp(22px,6vw,38px);font-size:clamp(13px,3.5vw,17px);cursor:pointer;letter-spacing:2px;font-family:monospace;margin-top:6px;}
</style>
</head>
<body>
<div id="gw">
<canvas id="c"></canvas>
<div id="hud">
  <div><div id="sc">0</div><div id="wlbl">WAVE 1</div></div>
  <div id="lbar">
    <button class="lb" id="l-uz" onclick="sL('uz')" style="background:rgba(0,255,0,0.15);border-color:#0f0;color:#0f0;">UZ</button>
    <button class="lb" id="l-ru" onclick="sL('ru')" style="background:rgba(255,255,255,0.05);border-color:#333;color:#555;">RU</button>
    <button class="lb" id="l-en" onclick="sL('en')" style="background:rgba(255,255,255,0.05);border-color:#333;color:#555;">EN</button>
  </div>
  <div id="rhud">
    <div id="lhud">💚💚💚</div>
    <div id="hpbw"><div id="hpf"></div></div>
    <div id="aml">🔫 30</div>
  </div>
</div>
<div id="msg"></div>
<div id="crosshair"></div>
<div id="jw"><div id="js"></div></div>
<div id="fire-btn" style="display:none;">🔫</div>
<div id="reload-btn" style="display:none;">🔄</div>
<div id="ov">
  <div id="otitle">⚔ ARENA</div>
  <div id="odesc"></div>
  <div id="osc"></div>
  <button id="pbtn" onclick="startG()"></button>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TR={
  uz:{s:"BOSHLASH",d:"📱 Joystick — yurish\n2 barmog'ingiz — qarash\n🔫 — otish | 🔄 — o'q yuklash\n🖥 WASD+sichqoncha | Klik=otish",go:"HALOKAT",sc:"Ball",wave:"TO'LQIN",r:"QAYTA",hp:"HP",ammo:"O'q",kills:"Kill"},
  ru:{s:"НАЧАТЬ",d:"📱 Джойстик — движение\n2 пальца — обзор\n🔫 — стрелять | 🔄 — перезарядка\n🖥 WASD+мышь | ЛКМ=огонь",go:"ПОГИБ",sc:"Очки",wave:"ВОЛНА",r:"СНОВА",hp:"HP",ammo:"Патр",kills:"Kill"},
  en:{s:"START",d:"📱 Joystick — move\n2 fingers — look\n🔫 — shoot | 🔄 — reload\n🖥 WASD+mouse | Click=shoot",go:"DEAD",sc:"Score",wave:"WAVE",r:"AGAIN",hp:"HP",ammo:"Ammo",kills:"Kills"}
};
let lang="uz";
function sL(l){lang=l;document.querySelectorAll(".lb").forEach(b=>{b.style.background="rgba(255,255,255,0.05)";b.style.borderColor="#333";b.style.color="#555";});const a=document.getElementById("l-"+l);a.style.background="rgba(0,255,0,0.15)";a.style.borderColor="#0f0";a.style.color="#0f0";if(!run)showOv();document.getElementById("wlbl").textContent=TR[lang].wave+" "+wave;}

const gw=document.getElementById("gw"),cv=document.getElementById("c");
const ren=new THREE.WebGLRenderer({canvas:cv,antialias:true});
ren.setPixelRatio(Math.min(devicePixelRatio,1.5));
const scene=new THREE.Scene();scene.background=new THREE.Color(0x050a05);scene.fog=new THREE.Fog(0x050a05,18,45);
const cam=new THREE.PerspectiveCamera(75,1,0.1,100);cam.position.set(0,1.7,0);
scene.add(new THREE.AmbientLight(0x112211,2));
const dl=new THREE.DirectionalLight(0x44ff44,0.8);dl.position.set(10,20,10);dl.castShadow=true;scene.add(dl);

// Floor
const flr=new THREE.Mesh(new THREE.PlaneGeometry(40,40),new THREE.MeshLambertMaterial({color:0x0a1a0a}));
flr.rotation.x=-Math.PI/2;flr.receiveShadow=true;scene.add(flr);
scene.add(new THREE.GridHelper(40,20,0x003300,0x001a00));

// Walls & covers
const walls=[];
const wM=new THREE.MeshLambertMaterial({color:0x0f2010});
function mkWall(x,y,z,w,h,d){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wM);m.position.set(x,y,z);m.castShadow=true;scene.add(m);walls.push(m);}
function mkCover(x,z,rx,rz){const m=new THREE.Mesh(new THREE.BoxGeometry(rx||2,1.4,rz||1),new THREE.MeshPhongMaterial({color:0x1a3a1a,emissive:0x051005}));m.position.set(x,0.7,z);m.castShadow=true;scene.add(m);walls.push(m);}
function mkPillar(x,z){const p=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,4,8),new THREE.MeshPhongMaterial({color:0x003300,emissive:0x004400}));p.position.set(x,2,z);scene.add(p);walls.push(p);const gl=new THREE.PointLight(0x00ff44,1.2,8);gl.position.set(x,4.2,z);scene.add(gl);}
mkWall(0,2,20,40,4,1);mkWall(0,2,-20,40,4,1);mkWall(20,2,0,1,4,40);mkWall(-20,2,0,1,4,40);
mkPillar(-16,16);mkPillar(16,16);mkPillar(-16,-16);mkPillar(16,-16);mkPillar(-8,0);mkPillar(8,0);
mkCover(-6,6);mkCover(6,6);mkCover(-6,-6);mkCover(6,-6);mkCover(0,12,3,2);mkCover(0,-12,3,2);mkCover(-12,0,1,3);mkCover(12,0,1,3);

// Enemy
const eMs=[new THREE.MeshPhongMaterial({color:0xff2200,emissive:0x440000}),new THREE.MeshPhongMaterial({color:0xff6600,emissive:0x331100}),new THREE.MeshPhongMaterial({color:0x9900ff,emissive:0x220033})];
function mkEnemy(type,pos){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,1.2,8),eMs[type]);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,8,8),eMs[type]);head.position.y=0.85;
  const eye=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),new THREE.MeshBasicMaterial({color:0xff0000}));eye.position.set(0.15,0.9,0.22);
  g.add(body,head,eye);g.position.copy(pos);g.position.y=0.6;
  const pl=new THREE.PointLight(eMs[type].color,0.6,5);g.add(pl);scene.add(g);
  return{mesh:g,hp:type===2?60:type===1?40:25,type,speed:0.04+type*0.014,sT:2+Math.random()*2};
}

const bG=new THREE.SphereGeometry(0.08,5,5);
const bM=new THREE.MeshBasicMaterial({color:0x00ffff});
const ebM=new THREE.MeshBasicMaterial({color:0xff4400});
let parts=[];
function boom(pos,col,n){for(let i=0;i<(n||10);i++){const p=new THREE.Mesh(new THREE.SphereGeometry(0.07+Math.random()*0.09,4,4),new THREE.MeshBasicMaterial({color:col||0xff4400,transparent:true}));p.position.copy(pos);const v=new THREE.Vector3((Math.random()-0.5)*0.5,(Math.random()*0.3+0.1),(Math.random()-0.5)*0.5);parts.push({mesh:p,vel:v,life:1});scene.add(p);}}

// Audio
let ac=null;
function tn(f,tp,dur,v){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=tp||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.start();o.stop(ac.currentTime+dur);}catch(e){}}
function sGun(){tn(220,"square",0.07,0.14);tn(110,"sawtooth",0.06,0.1);}
function sHit(){[180,130,90].forEach((f,i)=>setTimeout(()=>tn(f,"sawtooth",0.12,0.18),i*30));}
function sDie(){[300,200,100].forEach((f,i)=>setTimeout(()=>tn(f,"sawtooth",0.14,0.2),i*50));}
function sReload(){tn(150,"square",0.08,0.12);setTimeout(()=>tn(200,"square",0.06,0.1),300);}
function sWave(){[400,500,650,800].forEach((f,i)=>setTimeout(()=>tn(f,"sine",0.1,0.15),i*80));}

// State
let score=0,hp=100,wave=1,ammo=30,run=false,raf,lastT=0;
let enemies=[],pB=[],eB=[],wLeft=0,wSpawned=0,spT=0,shooting=false,shT=0,reloading=false,kills=0;
let yaw=0,pitch=0,keys={},locked=false;
let jX=0,jY=0,jA=false,jSt={x:0,y:0};
let msgTid;

function showM(t,c){const m=document.getElementById("msg");m.textContent=t;m.style.color=c||"#0f0";m.style.opacity=1;clearTimeout(msgTid);msgTid=setTimeout(()=>m.style.opacity=0,1200);}
function updH(){
  document.getElementById("sc").textContent=score;
  document.getElementById("wlbl").textContent=TR[lang].wave+" "+wave;
  document.getElementById("lhud").innerHTML=Array(3).fill(0).map((_,i)=>`<span style="opacity:${i<Math.ceil(hp/34)?1:0.15}">💚</span>`).join("");
  document.getElementById("hpf").style.width=Math.max(0,hp)+"%";
  document.getElementById("hpf").style.background=hp>50?"linear-gradient(90deg,#0f0,#8f0)":hp>25?"linear-gradient(90deg,#fa0,#f80)":"linear-gradient(90deg,#f44,#f00)";
  document.getElementById("aml").textContent=reloading?"🔄...":"🔫 "+ammo;
}

function sphBox(sp,sr,box){const b=new THREE.Box3().setFromObject(box);const cl=b.clampPoint(sp,new THREE.Vector3());return cl.distanceTo(sp)<sr;}
function hitsWall(pos,r){return walls.some(w=>sphBox(pos,r,w));}

function resize(){const W=gw.offsetWidth,H=gw.offsetHeight||window.innerHeight;ren.setSize(W,H);cam.aspect=W/H;cam.updateProjectionMatrix();}
resize();new ResizeObserver(resize).observe(gw);

// Pointer lock
cv.addEventListener("click",()=>{if(run&&!locked)cv.requestPointerLock&&cv.requestPointerLock();});
document.addEventListener("pointerlockchange",()=>{locked=document.pointerLockElement===cv;});
document.addEventListener("mousemove",e=>{if(!run||!locked)return;yaw-=e.movementX*0.002;pitch-=e.movementY*0.002;pitch=Math.max(-0.4,Math.min(0.4,pitch));});
document.addEventListener("mousedown",e=>{if(e.button===0&&run&&locked)shooting=true;});
document.addEventListener("mouseup",()=>shooting=false);
document.addEventListener("keydown",e=>{keys[e.code]=true;if(e.code==="KeyR"&&!reloading&&ammo<30)doReload();});
document.addEventListener("keyup",e=>keys[e.code]=false);

// Joystick
const jw=document.getElementById("jw"),js=document.getElementById("js");
function jD(e){jA=true;const t=e.touches?e.touches[0]:e;jSt={x:t.clientX,y:t.clientY};e.preventDefault();}
function jM(e){if(!jA)return;const t=e.touches?e.touches[0]:e;const dx=t.clientX-jSt.x,dy=t.clientY-jSt.y;const r=jw.offsetWidth/2,len=Math.hypot(dx,dy);const nx=len>r?dx/len*r:dx,ny=len>r?dy/len*r:dy;js.style.transform=`translate(calc(-50% + ${nx}px),calc(-50% + ${ny}px))`;jX=nx/r;jY=ny/r;e.preventDefault();}
function jU(){jA=false;jX=0;jY=0;js.style.transform="translate(-50%,-50%)";}
jw.addEventListener("touchstart",jD,{passive:false});jw.addEventListener("touchmove",jM,{passive:false});jw.addEventListener("touchend",jU);

// 2-finger look
let tLook=null;
cv.addEventListener("touchmove",e=>{if(e.touches.length>=2){const ax=(e.touches[0].clientX+e.touches[1].clientX)/2,ay=(e.touches[0].clientY+e.touches[1].clientY)/2;if(tLook){yaw-=(ax-tLook.x)*0.005;pitch-=(ay-tLook.y)*0.004;pitch=Math.max(-0.4,Math.min(0.4,pitch));}tLook={x:ax,y:ay};}else tLook=null;},{passive:true});

const fireBtn=document.getElementById("fire-btn"),relBtn=document.getElementById("reload-btn");
fireBtn.addEventListener("touchstart",e=>{shooting=true;e.preventDefault();},{passive:false});
fireBtn.addEventListener("touchend",()=>shooting=false);
fireBtn.addEventListener("mousedown",()=>shooting=true);
fireBtn.addEventListener("mouseup",()=>shooting=false);
relBtn.addEventListener("touchstart",e=>{doReload();e.preventDefault();},{passive:false});
relBtn.addEventListener("click",doReload);

function doShoot(){
  if(reloading)return;if(ammo<=0){doReload();return;}ammo--;
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
  const b=new THREE.Mesh(bG,bM.clone());b.position.copy(cam.position).addScaledVector(dir,0.5);
  pB.push({mesh:b,dir,speed:0.8,life:1.5});scene.add(b);sGun();updH();
  if(ammo<=0)doReload();
}
function doReload(){reloading=true;sReload();updH();setTimeout(()=>{ammo=30;reloading=false;updH();},2000);}
function spawnWave(){wLeft=4+wave*2;wSpawned=0;spT=0;showM(TR[lang].wave+" "+wave+"! ⚔","#0ff");sWave();updH();}
function spawnOne(){if(wSpawned>=wLeft)return;const a=Math.random()*Math.PI*2,r=14+Math.random()*4;const pos=new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r);const type=wave<=1?0:wave<=3?Math.floor(Math.random()*2):Math.floor(Math.random()*3);enemies.push(mkEnemy(type,pos));wSpawned++;}

function loop(ts){
  if(!run)return;raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  shT-=dt;spT-=dt;
  if(wSpawned<wLeft&&spT<=0){spawnOne();spT=0.6;}
  if(wSpawned>=wLeft&&enemies.length===0){wave++;spawnWave();}

  // Move
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const rgt=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  const spd=5*dt;
  const np=cam.position.clone();
  const kx=(keys["KeyD"]||keys["ArrowRight"]?1:0)-(keys["KeyA"]||keys["ArrowLeft"]?1:0)+jX;
  const ky=(keys["KeyS"]||keys["ArrowDown"]?1:0)-(keys["KeyW"]||keys["ArrowUp"]?1:0)+jY;
  np.addScaledVector(rgt,kx*spd);np.addScaledVector(fwd,-ky*spd);
  np.x=Math.max(-19,Math.min(19,np.x));np.z=Math.max(-19,Math.min(19,np.z));
  if(!hitsWall(np,0.4))cam.position.copy(np);
  cam.rotation.order="YXZ";cam.rotation.y=yaw;cam.rotation.x=pitch;
  if(shooting&&shT<=0&&!reloading){doShoot();shT=0.13;}

  // Player bullets
  for(let i=pB.length-1;i>=0;i--){
    const b=pB[i];b.mesh.position.addScaledVector(b.dir,b.speed*60*dt);b.life-=dt;
    if(b.life<=0||hitsWall(b.mesh.position,0.1)){scene.remove(b.mesh);pB.splice(i,1);continue;}
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(b.mesh.position.distanceTo(e.mesh.position)<0.7){e.hp-=25;boom(b.mesh.position.clone(),0xff4400,6);scene.remove(b.mesh);pB.splice(i,1);hit=true;if(e.hp<=0){kills++;score+=50*(e.type+1)*wave;boom(e.mesh.position.clone(),0xff6600,18);sDie();scene.remove(e.mesh);enemies.splice(j,1);showM("+"+50*(e.type+1)*wave,"#ff0");updH();}break;}
    }if(hit)continue;
  }

  // Enemies
  enemies.forEach(e=>{
    const toP=new THREE.Vector3().subVectors(cam.position,e.mesh.position).normalize();
    const np2=e.mesh.position.clone().addScaledVector(toP,e.speed*60*dt);
    if(!hitsWall(np2,0.5))e.mesh.position.copy(np2);else e.mesh.position.addScaledVector(new THREE.Vector3(-toP.z,0,toP.x),e.speed*40*dt);
    e.mesh.lookAt(cam.position.x,e.mesh.position.y,cam.position.z);e.mesh.position.y=0.6;
    e.sT-=dt;if(e.sT<=0&&e.mesh.position.distanceTo(cam.position)<20){const d=toP.clone();d.y+=0.05*(Math.random()-0.5);const eb=new THREE.Mesh(bG,ebM.clone());eb.position.copy(e.mesh.position).addScaledVector(d,0.8);eB.push({mesh:eb,dir:d,speed:0.3,life:2.5});scene.add(eb);e.sT=1.5+Math.random()*1.5;}
  });

  // Enemy bullets
  for(let i=eB.length-1;i>=0;i--){
    const b=eB[i];b.mesh.position.addScaledVector(b.dir,b.speed*60*dt);b.life-=dt;
    if(b.life<=0||hitsWall(b.mesh.position,0.08)){scene.remove(b.mesh);eB.splice(i,1);continue;}
    if(b.mesh.position.distanceTo(cam.position)<0.6){hp-=8;sHit();scene.remove(b.mesh);eB.splice(i,1);gw.style.boxShadow="inset 0 0 40px rgba(255,0,0,0.5)";setTimeout(()=>gw.style.boxShadow="none",150);if(hp<=0){endG();return;}updH();}
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.mesh.position.addScaledVector(p.vel,60*dt);p.vel.y-=0.015;p.life-=dt*2;p.mesh.material.opacity=Math.max(0,p.life);if(p.life<=0){scene.remove(p.mesh);parts.splice(i,1);}}

  ren.render(scene,cam);
}

function endG(){run=false;cancelAnimationFrame(raf);if(document.exitPointerLock)document.exitPointerLock();showOv(true);document.getElementById("ov").style.display="flex";[250,180,120].forEach((f,i)=>setTimeout(()=>tn(f,"sawtooth",0.18,0.18),i*80));}
function showOv(over){const t=TR[lang];document.getElementById("odesc").innerHTML=t.d.replace(/\n/g,"<br>");document.getElementById("pbtn").textContent=over?t.r:t.s;const s=document.getElementById("osc");if(over){s.style.display="block";s.textContent=t.sc+": "+score+" | "+t.kills+": "+kills+" | "+t.wave+": "+wave;}else s.style.display="none";}

function startG(){
